name: Export LikeC4 Diagrams
 
on:
  push:
    branches: [ "master", "develop" ]
    paths:
      - 'Docs/LikeC4/**'
  pull_request:
    branches: [ "master", "develop" ]
    paths:
      - 'Docs/LikeC4/**'
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
 
      - name: Install LikeC4 CLI
        run: npm install -g likec4

      - name: Install Playwright browsers
        run: |
          npm install -g playwright@1.47.0
          npx playwright install chromium --with-deps

      - name: Export diagrams to PNG
        run: |
          likec4 export png \
            --output Docs/Assets/Diagrams \
            Docs/LikeC4/
    
      - name: Upload diagram artifacts
        uses: actions/upload-artifact@v4
        with:
          name: likec4-diagrams-${{ github.sha }}
          path: Docs/Assets/Diagrams/
          retention-days: 30
