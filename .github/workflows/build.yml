name: Build
 
on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]
 
jobs:
  build-debug:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
 
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-arm-none-eabi ninja-build clang-tidy clang-format
 
      - name: Configure (Debug)
        run: cmake --preset Debug

      - name: Build (Debug)
        run: cmake --build --preset Debug

      - name: Check formatting
        run: |
          find App/Src App/Inc -name '*.c' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror
 
      - name: Run clang-tidy
        run: |
          clang-tidy App/Src/*.c App/Src/Scenes/*.c \
            -p build/Debug/compile_commands.json

  build-release:
    runs-on: ubuntu-latest
    needs: build-debug
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-arm-none-eabi ninja-build

      - name: Configure (Release)
        run: cmake --preset Release

      - name: Build (Release)
        run: cmake --build --preset Release

      - name: Print binary size
        run: arm-none-eabi-size build/Release/stm32f4-ascii-graphics-demo.elf

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ github.sha }}
          path: build/Release/stm32f4-ascii-graphics-demo.elf
          retention-days: 15