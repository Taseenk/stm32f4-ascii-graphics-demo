# Site project metadata
site_name: STM32F4 ASCII Graphics Demo
site_url: https://taseenk.github.io/stm32f4-ascii-graphics-demo/
site_description: Real-time ASCII art demo scenes on a PC terminal, running bare-metal on the STM32F407 Discovery board.
site_author: Taseen Khan
repo_name: Taseenk/stm32f4-ascii-graphics-demo
repo_url: https://github.com/Taseenk/stm32f4-ascii-graphics-demo

# Configuration for the Material theme
theme:
  name: material
  palette:
    # Dark mode color scheme configuration
    - scheme: slate
      primary: red
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

    # Light mode color scheme configuration
    - scheme: default
      primary: red
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

  # UI features and navigation behaviors
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.sections
    - navigation.top
    - content.code.copy

  # Typography settings
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  language: en

# Extension plugins for MkDocs functionality
plugins:
  - search  # Enables built-in search bar functionality
  - likec4  # Support for LikeC4 architecture diagrams
  - mkdoxy: # Doxygen integration for technical C documentation
      projects:
        stm32f4_ascii_graphics_demo:
          doxy-cfg-file: 'Docs\Doxyfile'
          src-dirs: 'App'
          doxy-cfg: # Overrides for Doxygen configuration
            OPTIMIZE_OUTPUT_FOR_C: YES
            EXTRACT_ALL: YES
            HIDE_UNDOC_MEMBERS: NO
            SOURCE_BROWSER: NO
            VERBATIM_HEADERS: NO
            INLINE_SOURCES: NO
            SHOW_USED_FILES: NO
            SHOW_INCLUDE_FILES: NO
            SHOW_NAMESPACES: NO
            XML_PROGRAMLISTING: NO

# Markdown parsing extensions
markdown_extensions:
  - admonition  # Info, Note, and Warning boxes
  - tables  # Standard GFM table support
  - pymdownx.highlight: # Code syntax highlighting
      anchor_linenums: true
  - pymdownx.superfences  # Code syntax highlighting
  - pymdownx.inlinehilite # Inline code highlighting
  - toc:  # Table of contents configuration
      permalink: true

# Source directory for markdown files
docs_dir: Docs

# Navigation structure for the sidebar and tabs
