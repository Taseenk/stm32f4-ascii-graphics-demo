# Pages generated by Doxy but hidden from primary navigation
not_in_nav: |
  Tutorial/setup.md
  Tutorial/flashing.md
  Tutorial/terminal-setup.md
  How-to/index.md
  How-to/add-a-scene.md
  How-to/configure-uart-dma.md
  How-to/change-baud-fps.md
  Explanation/three-tier-architecture.md
  Explanation/dma-double-buffer.md
  Reference/modules.md
  Reference/api.md
  Reference/uart-bandwidth.md
  Reference/commands.md
  Reference/hardware-config.md
  Reference/index.md
  stm32f4_ascii_graphics_demo/*_source.md
  stm32f4_ascii_graphics_demo/namespaces.md
  stm32f4_ascii_graphics_demo/hierarchy.md
  stm32f4_ascii_graphics_demo/modules.md
  stm32f4_ascii_graphics_demo/class_member*
  stm32f4_ascii_graphics_demo/namespace_member*

validation:
  links:
    # Fail build for broken internal links (.md or anchors)
    unrecognized_links: warn 
    # Ensure you don't accidentally use site-root links like /page/
    absolute_links: warn
    # NEW in 1.6: Validates that #anchors actually exist on the page
    anchors: warn 
  nav:
    # Fail if a file exists in docs/ but isn't in your nav (no "orphaned" pages)
    omitted_files: warn
    # Fail if nav points to a file that doesn't exist
    not_found: warn